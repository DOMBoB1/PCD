# server_inet runtime configuration — parsed with libconfig

server = {
    port           = 8080;
    workers        = 4;
    max_clients    = 1024;               # hard cap (≤ FD_SETSIZE)
    max_source_mb  = 0;                  # execution size guard (MB); 0 = unlimited
    login_file     = "servers/login.txt";
    admin_socket   = "/tmp/server_admin.sock";
    admin_tcp_port = 8082;               # INET admin client port; 0 = disabled
    log_level            = 4;            # 0=FATAL 1=INFO 2=ERR 3=WRN 4=DBG
    exec_mem_default_mb  = 0;         # default ulimit when client sends 0 (MB); 0=truly unlimited
};

# Each entry maps a language ID (sent in ReqHeader.language) to build/run commands.
# Template tokens:  {src} = source file path   {bin} = compiled binary path
#
# fixed_src : code is saved under this literal name (Java requires class == filename)
# serialize : true = compile+run serialised per language (one task at a time)

languages = (
    { id=1;  name="C";          extension="c";     compile="gcc {src} -o {bin} -lm 2>&1"; run="./{bin} 2>&1";                            serialize=false; },
    { id=2;  name="Python";     extension="py";    compile="";                             run="python3 {src} 2>&1";                       serialize=false; },
    { id=3;  name="C++";        extension="cpp";   compile="g++ -std=c++17 {src} -o {bin} 2>&1"; run="./{bin} 2>&1";                      serialize=false; },
    { id=4;  name="Java";       extension="java";  compile="javac {src} 2>&1";             run="java Main 2>&1"; fixed_src="Main.java";    serialize=true;  },
    { id=5;  name="Bash";       extension="sh";    compile="";                             run="bash {src} 2>&1";                          serialize=false; },
    { id=6;  name="JavaScript"; extension="js";    compile="";                             run="node {src} 2>&1";                          serialize=false; },
    { id=7;  name="Ruby";       extension="rb";    compile="";                             run="ruby {src} 2>&1";                          serialize=false; },
    { id=8;  name="Go";         extension="go";    compile="go build -o {bin} {src} 2>&1"; run="./{bin} 2>&1";                            serialize=false; },
    { id=9;  name="Rust";       extension="rs";    compile="rustc {src} -o {bin} 2>&1";   run="./{bin} 2>&1";                             serialize=false; },
    { id=10; name="PHP";        extension="php";   compile="";                             run="php {src} 2>&1";                           serialize=false; },
    { id=11; name="Perl";       extension="pl";    compile="";                             run="perl {src} 2>&1";                          serialize=false; },
    { id=12; name="TypeScript"; extension="ts";    compile="";                             run="npx --yes ts-node --transpile-only {src} 2>&1"; serialize=false; },
    { id=13; name="Haskell";    extension="hs";    compile="";                             run="runghc {src} 2>&1";                        serialize=false; },
    { id=14; name="Lua";        extension="lua";   compile="";                             run="lua {src} 2>&1";                           serialize=false; },
    { id=15; name="R";          extension="r";     compile="";                             run="Rscript {src} 2>&1";                       serialize=false; },
    { id=16; name="Swift";      extension="swift"; compile="swiftc {src} -o {bin} 2>&1";  run="./{bin} 2>&1";                             serialize=false; },
    { id=17; name="Kotlin";     extension="kt";    compile="";                             run="kotlinc-jvm -script {src} 2>&1";           serialize=false; },
    { id=18; name="Fortran";    extension="f90";   compile="gfortran {src} -o {bin} 2>&1"; run="./{bin} 2>&1";                            serialize=false; }
);
